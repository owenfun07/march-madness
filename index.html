<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>March Madness Loader</title>
<style>
  body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: Arial, sans-serif; }
  
  #loader {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #0b3d91, #c8102e);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    z-index: 9999;
    transition: opacity 0.6s ease, visibility 0.6s;
  }

  #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .bounce { animation: bounce 1s infinite ease-in-out; }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-40px); } }

  .ball {
    width: 80px; height: 80px; border-radius: 50%; background: #ff8c00;
    position: relative; animation: spin 1.2s linear infinite;
    box-shadow: inset -8px -8px 0 rgba(0,0,0,0.2);
    border: 2px solid #000;
  }

  .ball::before { content: ""; position: absolute; width: 100%; height: 4px; top: 50%; background: black; transform: translateY(-50%); }
  .ball::after { content: ""; position: absolute; height: 100%; width: 4px; left: 50%; background: black; transform: translateX(-50%); }

  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  .ncaa-logo { margin-top: 25px; width: 100px; }
  .text { margin-top: 20px; font-size: 24px; font-weight: bold; }

  /* Full screen iframe */
  iframe {
    width: 100%;
    height: 100vh;
    border: none;
    display: block;
  }
</style>
</head>
<body>

<div id="loader">
  <div class="bounce">
    <div class="ball"></div>
  </div>
  <div class="text">Loading the Madness...</div>
  <img class="ncaa-logo" src="https://i.ibb.co/0jhk3s02/image.png" alt="NCAA Logo">
</div>

<!-- ADDED SANDBOX ATTRIBUTE BELOW -->
<iframe 
  src="https://www.ncaa.com/march-madness-live/multigame" 
  id="frame" 
  allow="autoplay; fullscreen; keyboard; focus-without-user-activation; encrypted-media; picture-in-picture"
  sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation allow-storage-access-by-user-activation"

></iframe>

  <p>Your browser does not support iframes. <a href="ncaa.com">Click here to watch</a></p>
</iframe>

<script>
  const loader = document.getElementById('loader');
  const iframe = document.getElementById('frame');
  const MIN_TIME = 3000; // Reduced for better UX
  const MAX_TIME = 10000;
  let startTime = Date.now();

  function hideLoader() {
    loader.classList.add('hidden');
  }

  // Hide loader when iframe finishes internal tasks
  iframe.addEventListener('load', () => {
    const elapsed = Date.now() - startTime;
    const remaining = Math.max(0, MIN_TIME - elapsed);
    setTimeout(hideLoader, remaining);
  });

  // Safety timeout in case the iframe is blocked or slow
  setTimeout(hideLoader, MAX_TIME);
</script>

</body>
</html>
