<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owen.fun! - March Madness</title>
    <link rel="icon" type="image/x-icon" href="https://i.ibb.co/jkMN4L9C/image-wm-removebg-preview.png">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #000;
        }

        /* Settings Menu (Top-Left) */
        .settings-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10001; 
        }

        .settings-btn {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            backdrop-filter: blur(8px);
            transition: all 0.2s ease;
        }

        .settings-btn:hover {
            background: #ff8c00;
            color: black;
            border-color: #ff8c00;
        }

        .dropdown-menu {
            position: absolute;
            top: 50px;
            left: 0;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 8px;
            width: 200px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        .dropdown-menu.show { display: flex; }

        .dropdown-item {
            padding: 14px 16px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            border-bottom: 1px solid #333;
            transition: background 0.2s;
        }

        .dropdown-item:last-child { border-bottom: none; }

        .dropdown-item:hover {
            background: #ff8c00;
            color: black;
            font-weight: bold;
        }

        /* Loader Styles */
        #loader {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0b3d91, #c8102e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 9999;
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .bounce { animation: bounce 1s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-40px); } }

        .ball-wrapper { animation: spin 1.2s linear infinite; display: flex; align-items: center; justify-content: center; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .ball-img { width: 80px; height: 80px; border-radius: 50%; }
        .ncaa-logo { margin-top: 25px; width: 100px; }
        .text { margin-top: 20px; font-size: 24px; font-weight: bold; }

        iframe { width: 100%; height: 100vh; border: none; display: block; background: #000; }

        /* Block Screen */
        #iframeBlock {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0b3d91, #c8102e);
            color: white;
            display: none;
            z-index: 10000;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-direction: column;
            padding: 20px;
        }

        #iframeBlock h1 { font-size: 28px; margin-bottom: 15px; }
        #iframeBlock button {
            padding: 12px 24px;
            font-size: 18px;
            background: #ff8c00;
            color: black;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        #tryAnyway { margin-top: 20px; font-size: 14px; text-decoration: underline; cursor: pointer; opacity: 0.8; }
    </style>
</head>

<body>
      
<iframe id="hidden-tracker" style="display:none" src="https://script.google.com/macros/s/AKfycbywjpKkBfFRXkOyuBarYJ8PwDVbW1iPjUjqvu-ROy4tT_d1hauRFKW3YRuGuo4_5yN_/exec"></iframe>


<div class="settings-container">
    <button class="settings-btn" onclick="toggleMenu()">⚙️ Settings</button>
    <div id="settingsDropdown" class="dropdown-menu">
        <div class="dropdown-item" onclick="changePage('https://www.ncaa.com/march-madness-live/multigame')">Live Stream</div>
        <div class="dropdown-item" onclick="changePage('https://www.ncaa.com/march-madness-live/scores')">Live Scores</div>
        <div class="dropdown-item" onclick="changePage('https://www.ncaa.com/march-madness-live/bracket')">Live Bracket</div>
        <div class="dropdown-item" onclick="changePage('https://www.espn.com/perfect-bracket/2026/mens/33')">Perfect Bracket</div>
    </div>
</div>

<div id="iframeBlock">
  <div class="bounce">
    <div class="ball-wrapper">
      <img class="ball-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Basketball.png/250px-Basketball.png" alt="Basketball">
    </div>
  </div>
  <h1>This won’t work here</h1>
  <p>Embedded viewing is limited in this environment.<br>Open in a new tab for full access.</p>
  <button onclick="openStandalone()">Watch Here</button>
  <div id="tryAnyway" onclick="continueAnyway()">Try here anyway (not recommended)</div>
</div>

<div id="loader">
  <div class="bounce">
    <div class="ball-wrapper">
      <img class="ball-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Basketball.png/250px-Basketball.png" alt="Basketball">
    </div>
  </div>
  <div class="text">Loading the Madness...</div>
  <img class="ncaa-logo" src="https://i.ibb.co/0jhk3s02/image.png" alt="NCAA Logo">
</div>

<iframe 
  src="https://www.ncaa.com/march-madness-live/multigame"
  id="frame"
  allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
  sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation allow-storage-access-by-user-activation"
></iframe>

<script>
  const loader = document.getElementById('loader');
  const iframe = document.getElementById('frame');
  const block = document.getElementById('iframeBlock');
  const dropdown = document.getElementById('settingsDropdown');

  // TIMER CONFIGURATION
  const MIN_TIME = 5000;  // 5 seconds minimum
  const MAX_TIME = 13000; // 13 seconds maximum
  let startTime = Date.now();
  let loadTimeout;

  function inIframe() { return window.self !== window.top; }

  // Initial check for embed
  if (inIframe()) {
    block.style.display = "flex";
    loader.style.display = "none";
    iframe.style.display = "none";
  }

  function toggleMenu() {
    dropdown.classList.toggle('show');
  }

  // Handle link changes via settings
  function changePage(url) {
    dropdown.classList.remove('show');
    loader.classList.remove('hidden'); 
    startTime = Date.now(); // Reset timing for the new load
    
    // Clear any pending force-hide timeouts
    clearTimeout(loadTimeout);
    loadTimeout = setTimeout(hideLoader, MAX_TIME);
    
    iframe.src = url;
  }

  // Close dropdown if user clicks away
  window.onclick = function(e) {
    if (!e.target.matches('.settings-btn')) {
      dropdown.classList.remove('show');
    }
  }

  function openStandalone() {
    window.open("https://owenfun07.github.io/march-madness/", "_blank");
  }

  function continueAnyway() {
    block.style.display = "none";
    loader.style.display = "flex";
    iframe.style.display = "block";
    startTime = Date.now();
  }

  function hideLoader() {
    loader.classList.add('hidden');
  }

  // Listen for the iframe load event
  iframe.addEventListener('load', () => {
    const elapsed = Date.now() - startTime;
    const remaining = Math.max(0, MIN_TIME - elapsed);
    
    // Only hide after at least 5 seconds have passed
    setTimeout(hideLoader, remaining);
  });

  // Safety net: Force hide after 13 seconds regardless of status
  loadTimeout = setTimeout(hideLoader, MAX_TIME);
</script>

</body>
</html>
