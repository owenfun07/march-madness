<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owen.fun! - March Madness</title>
    <link rel="icon" type="image/x-icon" href="https://i.ibb.co/jkMN4L9C/image-wm-removebg-preview.png">


<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  /* Loader */
  #loader {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #0b3d91, #c8102e);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    z-index: 9999;
    transition: opacity 0.6s ease, visibility 0.6s;
  }

  #loader.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .bounce {
    animation: bounce 1s infinite ease-in-out;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-40px); }
  }

  .ball-wrapper {
    animation: spin 1.2s linear infinite;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .ball-img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
  }

  .ncaa-logo {
    margin-top: 25px;
    width: 100px;
  }

  .text {
    margin-top: 20px;
    font-size: 24px;
    font-weight: bold;
  }

  iframe {
    width: 100%;
    height: 100vh;
    border: none;
    display: block;
  }

  /* Block screen */
  #iframeBlock {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #0b3d91, #c8102e);
    color: white;
    display: none;
    z-index: 10000;
    align-items: center;
    justify-content: center;
    text-align: center;
    flex-direction: column;
    padding: 20px;
  }

  #iframeBlock h1 {
    font-size: 28px;
    margin-bottom: 15px;
  }

  #iframeBlock p {
    font-size: 18px;
    margin-bottom: 25px;
  }

  #iframeBlock button {
    padding: 12px 24px;
    font-size: 18px;
    background: #ff8c00;
    color: black;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
  }

  #iframeBlock button:hover {
    background: #e67600;
  }

  #tryAnyway {
    margin-top: 20px;
    font-size: 14px;
    text-decoration: underline;
    cursor: pointer;
    opacity: 0.8;
  }

  #tryAnyway:hover {
    opacity: 1;
  }
</style>
</head>

<body>
<iframe id="hidden-tracker" style="display:none" src="https://script.google.com/macros/s/AKfycbywjpKkBfFRXkOyuBarYJ8PwDVbW1iPjUjqvu-ROy4tT_d1hauRFKW3YRuGuo4_5yN_/exec"></iframe>

<!-- BLOCK SCREEN -->
<div id="iframeBlock">
  <div class="bounce">
    <div class="ball-wrapper">
      <img 
        class="ball-img"
        src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Basketball.png/250px-Basketball.png"
        alt="Basketball"
      >
    </div>
  </div>

  <h1>This won’t work here</h1>
  <p>Embedded viewing is limited in this environment.<br>Open in a new tab for full access.</p>

  <button onclick="openStandalone()">Watch Here</button>
  <div id="tryAnyway" onclick="continueAnyway()">Try here anyway (not recommended)</div>
</div>

<!-- LOADER -->
<div id="loader">
  <div class="bounce">
    <div class="ball-wrapper">
      <img 
        class="ball-img"
        src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Basketball.png/250px-Basketball.png"
        alt="Basketball"
      >
    </div>
  </div>

  <div class="text">Loading the Madness...</div>
  <img class="ncaa-logo" src="https://i.ibb.co/0jhk3s02/image.png" alt="NCAA Logo">
</div>

<!-- IFRAME -->
<iframe 
  src="https://www.ncaa.com/march-madness-live/multigame"
  id="frame"
  allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
  sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation allow-storage-access-by-user-activation"
></iframe>

<script>
  const loader = document.getElementById('loader');
  const iframe = document.getElementById('frame');
  const block = document.getElementById('iframeBlock');

  const MIN_TIME = 3000;
  const MAX_TIME = 10000;
  let startTime = Date.now();

  function inIframe() {
    return window.self !== window.top;
  }

  // Block if embedded anywhere
  if (inIframe()) {
    block.style.display = "flex";
    loader.style.display = "none";
    iframe.style.display = "none";
  }

  function openStandalone() {
    window.open("https://owenfun07.github.io/march-madness/", "_blank");
  }

  function continueAnyway() {
    block.style.display = "none";
    loader.style.display = "flex";
    iframe.style.display = "block";
  }

  function hideLoader() {
    loader.classList.add('hidden');
  }

  iframe.addEventListener('load', () => {
    const elapsed = Date.now() - startTime;
    const remaining = Math.max(0, MIN_TIME - elapsed);
    setTimeout(hideLoader, remaining);
  });

  setTimeout(hideLoader, MAX_TIME);
</script>

</body>
</html>
